services:
  ewa:
    build:
      context: .
    container_name: ewa
    restart: unless-stopped
    ports:
      - "${EWA_PORT:-502}:502"
    environment:
      EWA_INTERACTIVE: "false"
      EWA_BIND_HOST: "0.0.0.0"
      EWA_BIND_PORT: "502"
      EWA_MQTT_HOST: "${EWA_MQTT_HOST:-mqtt}"
      EWA_MQTT_PORT: "${EWA_MQTT_PORT:-1883}"
      EWA_MQTT_USERNAME: "${EWA_MQTT_USERNAME:-}"
      EWA_MQTT_PASSWORD: "${EWA_MQTT_PASSWORD:-}"
      EWA_EVCC_MQTT_TOPIC: "${EWA_EVCC_MQTT_TOPIC:-evcc}"
      EWA_EVCC_LOADPOINT_ID: "${EWA_EVCC_LOADPOINT_ID:-1}"
      EWA_PHASES: "${EWA_PHASES:-1}"
      EWA_MAC: "${EWA_MAC:-E8D8D1663B5B}"
      EWA_SERIENNUMMER: "${EWA_SERIENNUMMER:-00000000001}"
      EWA_IP: "${EWA_IP:-192.168.179.30}"
      EWA_SUBNET: "${EWA_SUBNET:-255.255.255.0}"
      EWA_FIRMWARE: "${EWA_FIRMWARE:-1.21}"
      EWA_LADESTROM: "${EWA_LADESTROM:-160}"
      EWA_LADEKABEL: "${EWA_LADEKABEL:-320}"
      EWA_MAX_LADESTROM: "${EWA_MAX_LADESTROM:-320}"
      EWA_PHASES_MEASURED_URL: "${EWA_PHASES_MEASURED_URL:-}"
